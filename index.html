:root {
  color-scheme: light;
  --ink: #19212a;
  --soft-ink: #4e5b68;
  --paper: #fff9ed;
  --paper-strong: #ffffff;
  --coral: #ff6f61;
  --rose: #f65f8d;
  --mint: #4ecdc4;
  --leaf: #2f8f5b;
  --sky: #67b7dc;
  --gold: #ffd166;
  --violet: #7464d8;
  --line: #21313f;
  --shadow: rgba(16, 24, 32, 0.2);
}

* {
  box-sizing: border-box;
}

html,
body {
  min-height: 100%;
}

body {
  margin: 0;
  color: var(--ink);
  font-family:
    "MaruMinyaHangul",
    "Apple SD Gothic Neo",
    "Malgun Gothic",
    system-ui,
    sans-serif;
  background:
    linear-gradient(90deg, rgba(255, 255, 255, 0.05) 1px, transparent 1px),
    linear-gradient(0deg, rgba(255, 255, 255, 0.05) 1px, transparent 1px),
    #142331;
  background-size: 28px 28px;
}

button {
  font: inherit;
}

.app-shell {
  min-height: 100vh;
  overflow: hidden;
}

.intro-screen,
.letter-screen {
  min-height: 100vh;
  display: grid;
  place-items: center;
  padding: 24px;
}

.intro-panel,
.letter-panel {
  width: min(100%, 760px);
  border: 4px solid var(--line);
  border-radius: 8px;
  background: var(--paper);
  box-shadow: 10px 10px 0 rgba(0, 0, 0, 0.32);
}

.intro-panel {
  padding: 32px;
  text-align: center;
}

.intro-kicker,
.letter-kicker {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  margin: 0 0 14px;
  padding: 7px 12px;
  border: 3px solid var(--line);
  border-radius: 8px;
  background: var(--gold);
  color: var(--ink);
  font-weight: 800;
}

.intro-title,
.letter-title {
  margin: 0;
  font-size: 2.15rem;
  line-height: 1.25;
}

.intro-subtitle {
  max-width: 580px;
  margin: 18px auto 0;
  color: var(--soft-ink);
  font-size: 1rem;
  line-height: 1.75;
}

.button-stage {
  position: relative;
  width: min(100%, 440px);
  height: 112px;
  margin: 30px auto 0;
}

.choice-button {
  min-width: 136px;
  min-height: 52px;
  border: 4px solid var(--line);
  border-radius: 8px;
  color: var(--ink);
  cursor: pointer;
  font-weight: 900;
  box-shadow: 5px 5px 0 rgba(0, 0, 0, 0.25);
  transition:
    transform 120ms ease,
    box-shadow 120ms ease,
    background-color 120ms ease;
}

.choice-button:active {
  transform: translate(3px, 3px);
  box-shadow: 2px 2px 0 rgba(0, 0, 0, 0.25);
}

.yes-button {
  position: absolute;
  left: 30px;
  top: 30px;
  background: var(--mint);
}

.no-button {
  position: absolute;
  background: #ffb3c7;
  will-change: left, top;
}

.dodge-meter {
  min-height: 28px;
  margin: 18px 0 0;
  color: var(--rose);
  font-weight: 800;
}

.game-screen {
  min-height: 100vh;
  display: grid;
  align-items: center;
  padding: 18px;
  background:
    linear-gradient(90deg, rgba(255, 209, 102, 0.11) 1px, transparent 1px),
    linear-gradient(0deg, rgba(78, 205, 196, 0.1) 1px, transparent 1px),
    #172635;
  background-size: 32px 32px;
}

.game-layout {
  width: min(100%, 1220px);
  margin: 0 auto;
  display: grid;
  grid-template-columns: minmax(0, 1fr) 280px;
  gap: 16px;
  align-items: stretch;
}

.canvas-wrap {
  min-width: 0;
  border: 4px solid var(--line);
  border-radius: 8px;
  background: #090f16;
  box-shadow: 8px 8px 0 rgba(0, 0, 0, 0.3);
  overflow: hidden;
}

.game-canvas {
  display: block;
  width: 100%;
  aspect-ratio: 16 / 9;
  image-rendering: pixelated;
  touch-action: none;
}

.hud-panel {
  border: 4px solid var(--line);
  border-radius: 8px;
  background: var(--paper);
  box-shadow: 8px 8px 0 rgba(0, 0, 0, 0.3);
  padding: 18px;
}

.hud-label {
  margin: 0;
  color: var(--soft-ink);
  font-size: 0.85rem;
  font-weight: 800;
}

.hud-title {
  margin: 6px 0 16px;
  font-size: 1.35rem;
  line-height: 1.25;
}

.progress-list {
  display: grid;
  gap: 8px;
  margin: 0;
  padding: 0;
  list-style: none;
}

.progress-item {
  display: grid;
  grid-template-columns: 26px 1fr;
  gap: 8px;
  align-items: center;
  padding: 8px;
  border: 3px solid var(--line);
  border-radius: 8px;
  background: #ffffff;
  font-weight: 800;
}

.progress-item.is-active {
  background: #e3fbf6;
}

.progress-item.is-done {
  background: #fff2b8;
}

.progress-dot {
  display: grid;
  place-items: center;
  width: 26px;
  height: 26px;
  border: 3px solid var(--line);
  border-radius: 6px;
  background: var(--rose);
  color: #fff;
  font-size: 0.82rem;
}

.progress-item.is-done .progress-dot {
  background: var(--leaf);
}

.quest-status {
  min-height: 72px;
  margin: 16px 0 0;
  padding: 12px;
  border: 3px solid var(--line);
  border-radius: 8px;
  background: #f3f8ff;
  color: var(--soft-ink);
  line-height: 1.55;
}

.controls {
  display: grid;
  grid-template-columns: 136px 1fr;
  gap: 14px;
  align-items: end;
  margin-top: 16px;
}

.dpad {
  display: grid;
  grid-template-columns: repeat(3, 42px);
  grid-template-rows: repeat(3, 42px);
  gap: 5px;
}

.dpad-button,
.action-button {
  border: 3px solid var(--line);
  border-radius: 8px;
  background: #ffffff;
  color: var(--ink);
  cursor: pointer;
  font-weight: 900;
  box-shadow: 3px 3px 0 rgba(0, 0, 0, 0.2);
  touch-action: none;
  user-select: none;
}

.dpad-button:active,
.action-button:active {
  transform: translate(2px, 2px);
  box-shadow: 1px 1px 0 rgba(0, 0, 0, 0.22);
}

.dpad-up {
  grid-column: 2;
}

.dpad-left {
  grid-column: 1;
  grid-row: 2;
}

.dpad-right {
  grid-column: 3;
  grid-row: 2;
}

.dpad-down {
  grid-column: 2;
  grid-row: 3;
}

.action-button {
  min-height: 50px;
  background: var(--coral);
  color: #ffffff;
}

.battle-backdrop {
  position: fixed;
  inset: 0;
  z-index: 20;
  display: grid;
  place-items: center;
  padding: 18px;
  background: rgba(10, 16, 24, 0.72);
}

.battle-modal {
  width: min(100%, 620px);
  border: 4px solid var(--line);
  border-radius: 8px;
  background: var(--paper);
  box-shadow: 10px 10px 0 rgba(0, 0, 0, 0.35);
  padding: 22px;
}

.battle-name {
  margin: 0;
  font-size: 1.8rem;
}

.battle-copy {
  margin: 10px 0 16px;
  color: var(--soft-ink);
  line-height: 1.65;
}

.hp-shell {
  height: 24px;
  border: 3px solid var(--line);
  border-radius: 8px;
  overflow: hidden;
  background: #ffffff;
}

.hp-bar {
  height: 100%;
  background: var(--rose);
  transition: width 180ms ease;
}

.battle-actions {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin-top: 16px;
}

.battle-action {
  min-height: 48px;
  border: 3px solid var(--line);
  border-radius: 8px;
  background: var(--mint);
  color: var(--ink);
  cursor: pointer;
  font-weight: 900;
}

.battle-action:nth-child(2) {
  background: var(--gold);
}

.battle-action:nth-child(3) {
  background: #ff8fab;
}

.battle-action:disabled {
  cursor: default;
  opacity: 0.65;
}

.battle-log {
  min-height: 84px;
  margin: 16px 0 0;
  padding: 12px;
  border: 3px solid var(--line);
  border-radius: 8px;
  background: #ffffff;
  color: var(--soft-ink);
  line-height: 1.55;
}

.continue-button,
.restart-button {
  width: 100%;
  min-height: 52px;
  margin-top: 16px;
  border: 3px solid var(--line);
  border-radius: 8px;
  background: var(--violet);
  color: #ffffff;
  cursor: pointer;
  font-weight: 900;
}

.letter-panel {
  position: relative;
  padding: 30px;
  overflow: hidden;
}

.letter-panel::before {
  content: "";
  position: absolute;
  left: -20px;
  top: 22px;
  z-index: 1;
  width: calc(100% + 40px);
  height: 12px;
  background:
    repeating-linear-gradient(
      90deg,
      var(--coral) 0 28px,
      var(--mint) 28px 56px,
      var(--gold) 56px 84px,
      var(--sky) 84px 112px
    );
}

.fanfare-canvas {
  position: absolute;
  inset: 0;
  z-index: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
}

.letter-header {
  position: relative;
  z-index: 1;
  padding-top: 22px;
}

.letter-body {
  position: relative;
  z-index: 1;
  margin-top: 22px;
  display: grid;
  gap: 16px;
  color: #2f3842;
  font-size: 1.05rem;
  line-height: 1.85;
}

.letter-body p {
  margin: 0;
}

.letter-signature {
  position: relative;
  z-index: 1;
  margin-top: 24px;
  text-align: right;
  font-weight: 900;
}

.pixel-envelope {
  position: relative;
  z-index: 1;
  width: 132px;
  height: 92px;
  margin: 0 auto 20px;
  border: 4px solid var(--line);
  border-radius: 8px;
  background:
    linear-gradient(135deg, transparent 49%, var(--line) 50%, transparent 51%),
    linear-gradient(225deg, transparent 49%, var(--line) 50%, transparent 51%),
    #fff5c7;
  box-shadow: 6px 6px 0 rgba(0, 0, 0, 0.22);
}

.restart-button {
  max-width: 260px;
  display: block;
  position: relative;
  z-index: 1;
  margin: 28px auto 0;
  background: var(--leaf);
}

@media (max-width: 900px) {
  .game-layout {
    grid-template-columns: 1fr;
  }

  .hud-panel {
    order: -1;
  }

  .controls {
    grid-template-columns: 136px minmax(110px, 1fr);
  }
}

@media (max-width: 560px) {
  .intro-screen,
  .letter-screen,
  .game-screen {
    padding: 12px;
  }

  .intro-panel,
  .letter-panel,
  .battle-modal {
    padding: 20px;
  }

  .intro-title,
  .letter-title {
    font-size: 1.65rem;
  }

  .button-stage {
    height: 132px;
  }

  .yes-button {
    left: 8px;
  }

  .battle-actions {
    grid-template-columns: 1fr;
  }
}

    <script>
(function () {
  const { useCallback, useEffect, useMemo, useRef, useState } = React;
  const h = React.createElement;

  const LETTER_CONFIG = {
    recipientName: "지민이",
    senderName: "공주를 너무 사랑하는 강민이",
    title: "생일 축하해, 공주!!",
    paragraphs: [
      "공주 안녕? 손으로 편지를 쓰면 내 악필 때문에 자기가 감동을 못받고 이게 뭐야... 하면서 그루미 그루미 해질까봐 걱정되더라고. 그래서 명색이 컴공인데 내 장기를 살려서 조금 특별하고 재밌게 편지를 써보고 싶어서 이렇게 만들어봤어. 자기가 재밌어했을지는 모르겠지만, 나 진짜 시간 쪼개서 꽤 열심히 만들었다!",
      "우리 참 1년이라는 시간동안 많이 울고, 웃고, 싸우고, 또 화해하면서 치열하고 뜨겁게 사랑했다. 그치? 근데 어디서 보니까 많이 싸우는 커플이 한번도 안싸우는 커플보다 서로를 더 잘 알아서 오래오래 행복하대. 우리도 지금처럼 맞춰가면서 단단해지면 앞으로도 오래오래 행복할 수 있을거야. 그러니까 우리 앞으로도 많이 싸우고 또 울고 웃고 화해하면서 오순도순 잘 살자",
      "사실 우리 처음 만난 날에는 우리가 이렇게 사귀게 될 줄 몰랐어. 왜냐하면 자기가 나를 이성으로 생각하지 않는것 같았거든. 초면에 그런 얘기를 하는 사람이 어딨어... 그래서 그냥 나를 이성이 아니라 재밌는 친구로 생각하나보다 그랬지. 근데 자기가 내 일상에 스며들수록, 또 같이 있는 시간이 길어질수록 내 마음이 숨길 수 없을 정도로 커진것 같아. 자기가 먼저 나한테 사귀자그러고... 자기가 먼저 손을 내밀어 줘을때 정말 심장 떨렸다? 그때부터 지금까지 매일매일이 너무 행복해. 자기가 내 여자친구라서, 또 내 여자친구가 지민이라서 너무 고마워. 사랑해, 공주야.",
      "난 요즘 우리 둘이 같이 있을 떄가 세상에서 제일 행복해. 공주도 나랑 같은 마음이지? 그리고 앞으로 우리에게 다가올 날들도 쭉 그랬으면 좋겠어.",
      "오늘 공주의 생일도, 다가올 우리의 1주년도, 그리고 내년 공주의 생일에도 난 변함없이 아니 지금보다 더 자기를 사랑하면서 언제나 든든하게 자기 옆을 지킬게. 태어나줘서 고맙고, 내 곁에 와줘서 더 고마워. 다시 한번 생일 진짜 많이 축하해 공주야. 사랑해!!!",
    ],
  };

  const GAME_CONFIG = {
    width: 960,
    height: 540,
    mapName: "편지숲으로 가는 길",
    startMessage: "편지의 기운이 숲 안쪽에서 반짝이고 있어요.",
    monsters: [
      {
        id: "argument",
        name: "늘 있는 다툼",
        x: 270,
        y: 286,
        hp: 18,
        color: "#f65f8d",
        accent: "#ffd166",
        intro: "작은 말꼬리가 길을 막고 있어요.",
        victory: "서로의 마음을 천천히 들여다보자 길이 열렸어요.",
        lines: ["흥, 못난이 돼얌이 내 마음 하나도 몰라.", "뾰족한 말로 서로에게 상처를 줘야지.", "그래도 돼얌이와 공주는 서로 사랑해?"],
      },
      {
        id: "misunderstanding",
        name: "사소한 오해",
        x: 510,
        y: 226,
        hp: 22,
        color: "#7464d8",
        accent: "#67b7dc",
        intro: "뿌연 생각구름이 앞을 흐리고 있어요.",
        victory: "솔직한 설명이 구름을 걷어냈어요.",
        lines: ["혹시 그런 뜻이 아니었을까?", "한 번 더 너의 입장에서 생각해 보자.", "분명히 말하면 서로 오해할 일이 없을꺼야."],
      },
      {
        id: "temptation",
        name: "존잘 알파메일의 유혹",
        x: 735,
        y: 310,
        hp: 28,
        color: "#4ecdc4",
        accent: "#ff6f61",
        intro: "돼얌이보다 멋진 남자가 나타났어요.",
        victory: "단단한 믿음 앞에서 유혹은 반짝임을 잃었어요.",
        lines: ["내가 더 멋져 보이지?", "잠깐 흔들리면 되는 거야.", "돼얌이를 향한 그 믿음, 생각보다 강하네."],
      },
    ],
    letter: {
      x: 870,
      y: 256,
    },
  };

  const BATTLE_ACTIONS = [
    {
      id: "talk",
      label: "대화하기",
      power: 6,
      text: "차분한 대화가 마음의 매듭을 풀었어요.",
    },
    {
      id: "trust",
      label: "믿음 지키기",
      power: 7,
      text: "흔들리지 않는 믿음이 단단한 방패가 됐어요.",
    },
    {
      id: "love",
      label: "사랑으로 공격",
      power: 9,
      text: "사랑의 한 방이 반짝이며 들어갔어요.",
    },
  ];

  function App() {
    const [screen, setScreen] = useState("intro");

    if (screen === "game") {
      return h(RpgGame, { onComplete: () => setScreen("letter") });
    }

    if (screen === "letter") {
      return h(LetterReward, { onRestart: () => setScreen("intro") });
    }

    return h(IntroGate, { onAccept: () => setScreen("game") });
  }

  function IntroGate({ onAccept }) {
    const stageRef = useRef(null);
    const noButtonRef = useRef(null);
    const lastMoveRef = useRef(0);
    const [noPos, setNoPos] = useState({ left: 190, top: 30 });
    const [dodgeCount, setDodgeCount] = useState(0);

    const moveNoButton = useCallback((pointer) => {
      const stage = stageRef.current;
      const button = noButtonRef.current;
      if (!stage || !button) return;

      const now = performance.now();
      if (now - lastMoveRef.current < 90) return;
      lastMoveRef.current = now;

      const stageRect = stage.getBoundingClientRect();
      const buttonRect = button.getBoundingClientRect();
      const maxLeft = Math.max(8, stageRect.width - buttonRect.width - 8);
      const maxTop = Math.max(8, stageRect.height - buttonRect.height - 8);
      const localPointer = pointer
        ? {
            x: pointer.x - stageRect.left,
            y: pointer.y - stageRect.top,
          }
        : {
            x: stageRect.width / 2,
            y: stageRect.height / 2,
          };

      const candidates = Array.from({ length: 18 }, () => ({
        left: 8 + Math.random() * (maxLeft - 8),
        top: 8 + Math.random() * (maxTop - 8),
      }));

      const best = candidates.reduce((winner, candidate) => {
        const winnerDistance = distance(
          winner.left + buttonRect.width / 2,
          winner.top + buttonRect.height / 2,
          localPointer.x,
          localPointer.y,
        );
        const candidateDistance = distance(
          candidate.left + buttonRect.width / 2,
          candidate.top + buttonRect.height / 2,
          localPointer.x,
          localPointer.y,
        );
        return candidateDistance > winnerDistance ? candidate : winner;
      }, candidates[0]);

      setNoPos(best);
      setDodgeCount((count) => count + 1);
    }, []);

    useEffect(() => {
      const keepNoButtonInside = () => {
        const stage = stageRef.current;
        const button = noButtonRef.current;
        if (!stage || !button) return;

        const maxLeft = Math.max(8, stage.clientWidth - button.offsetWidth - 8);
        const maxTop = Math.max(8, stage.clientHeight - button.offsetHeight - 8);
        setNoPos((position) => ({
          left: clamp(position.left, 8, maxLeft),
          top: clamp(position.top, 8, maxTop),
        }));
      };

      keepNoButtonInside();
      window.addEventListener("resize", keepNoButtonInside);
      return () => window.removeEventListener("resize", keepNoButtonInside);
    }, []);

    const handlePointerMove = (event) => {
      const button = noButtonRef.current;
      if (!button) return;
      const rect = button.getBoundingClientRect();
      const centerX = rect.left + rect.width / 2;
      const centerY = rect.top + rect.height / 2;

      if (distance(event.clientX, event.clientY, centerX, centerY) < 128) {
        moveNoButton({ x: event.clientX, y: event.clientY });
      }
    };

    return h(
      "main",
      { className: "app-shell intro-screen" },
      h(
        "section",
        { className: "intro-panel", "aria-labelledby": "intro-title" },
        h("p", { className: "intro-kicker" }, "BIRTHDAY QUEST"),
        h("h1", { className: "intro-title", id: "intro-title" }, "생일 편지를 열람하시겠습니까?"),
        h(
          "p",
          { className: "intro-subtitle" },
          "편지는 그냥 열리지 않습니다. 마음의 숲을 지나 가장 깊은 곳에 숨겨진 봉투를 찾아야 해요.",
        ),
        h(
          "div",
          { className: "button-stage", ref: stageRef, onPointerMove: handlePointerMove },
          h(
            "button",
            { className: "choice-button yes-button", type: "button", onClick: onAccept },
            "예",
          ),
          h(
            "button",
            {
              ref: noButtonRef,
              className: "choice-button no-button",
              type: "button",
              style: { left: `${noPos.left}px`, top: `${noPos.top}px` },
              onPointerEnter: (event) => moveNoButton({ x: event.clientX, y: event.clientY }),
              onTouchStart: (event) => {
                event.preventDefault();
                const touch = event.touches[0];
                moveNoButton({ x: touch.clientX, y: touch.clientY });
              },
              onFocus: (event) => {
                moveNoButton();
                event.currentTarget.blur();
              },
              "aria-label": "아니오, 선택할 수 없는 장난 버튼",
            },
            "아니오",
          ),
        ),
        h(
          "p",
          { className: "dodge-meter", "aria-live": "polite" },
          dodgeCount > 0 ? `아니오는 ${dodgeCount}번 도망갔어요.` : "선택은 이미 정해진 것 같아요.",
        ),
      ),
    );
  }

  function RpgGame({ onComplete }) {
    const canvasRef = useRef(null);
    const keysRef = useRef(new Set());
    const virtualRef = useRef({ x: 0, y: 0 });
    const playerRef = useRef({ x: 78, y: 284, dir: "down", step: 0 });
    const statusRef = useRef(GAME_CONFIG.startMessage);
    const battleRef = useRef(null);
    const progressRef = useRef(0);
    const [progress, setProgress] = useState(0);
    const [battle, setBattle] = useState(null);
    const [statusText, setStatusText] = useState(GAME_CONFIG.startMessage);

    useEffect(() => {
      progressRef.current = progress;
    }, [progress]);

    useEffect(() => {
      battleRef.current = battle;
    }, [battle]);

    const completedIds = useMemo(
      () => GAME_CONFIG.monsters.slice(0, progress).map((monster) => monster.id),
      [progress],
    );

    const setStatus = useCallback((message) => {
      if (statusRef.current !== message) {
        statusRef.current = message;
        setStatusText(message);
      }
    }, []);

    const openBattle = useCallback(
      (monster) => {
        if (battleRef.current) return;
        setStatus(`${monster.name}이 앞을 막아섰어요.`);
        setBattle(monster);
      },
      [setStatus],
    );

    const completeBattle = useCallback(
      (monster) => {
        const nextProgress = progressRef.current + 1;
        const player = playerRef.current;
        player.x = Math.min(monster.x + 64, GAME_CONFIG.width - 72);
        player.y = monster.y;
        setBattle(null);
        setProgress(nextProgress);
        setStatus(monster.victory);
      },
      [setStatus],
    );

    const tryInteract = useCallback(() => {
      if (battleRef.current) return;
      const player = playerRef.current;
      const nextMonster = GAME_CONFIG.monsters[progressRef.current];

      if (nextMonster && distance(player.x, player.y, nextMonster.x, nextMonster.y) < 92) {
        openBattle(nextMonster);
        return;
      }

      if (!nextMonster && distance(player.x, player.y, GAME_CONFIG.letter.x, GAME_CONFIG.letter.y) < 96) {
        onComplete();
      }
    }, [onComplete, openBattle]);

    useEffect(() => {
      const down = (event) => {
        const key = event.key.toLowerCase();
        if (isGameKey(key)) {
          event.preventDefault();
          keysRef.current.add(key);
        }

        if (key === " " || key === "enter") {
          event.preventDefault();
          tryInteract();
        }
      };

      const up = (event) => {
        const key = event.key.toLowerCase();
        keysRef.current.delete(key);
      };

      window.addEventListener("keydown", down);
      window.addEventListener("keyup", up);
      return () => {
        window.removeEventListener("keydown", down);
        window.removeEventListener("keyup", up);
      };
    }, [tryInteract]);

    useEffect(() => {
      const canvas = canvasRef.current;
      const context = canvas.getContext("2d");
      let frameId = 0;
      let last = performance.now();

      const tick = (now) => {
        const delta = Math.min(2, (now - last) / 16.67);
        last = now;
        updateWorld(delta, keysRef.current, virtualRef.current, playerRef.current, {
          progress: progressRef.current,
          battle: battleRef.current,
          openBattle,
          setStatus,
          onComplete,
        });
        drawWorld(context, playerRef.current, progressRef.current, now);
        frameId = requestAnimationFrame(tick);
      };

      frameId = requestAnimationFrame(tick);

    }, [onComplete, openBattle, setStatus]);

    const setVirtual = (x, y) => {

  function BattleModal({ monster, onWin }) {
    const [hp, setHp] = useState(monster.hp);
    const [turn, setTurn] = useState(0);
    const [log, setLog] = useState([monster.intro]);
    const defeated = hp <= 0;

    useEffect(() => {
      setHp(monster.hp);
      setTurn(0);
      setLog([monster.intro]);
    }, [monster]);

    const useAction = (action) => {
      if (defeated) return;

      const nextHp = Math.max(0, hp - action.power);
      const line = monster.lines[turn % monster.lines.length];
      setHp(nextHp);
      setTurn((value) => value + 1);
      setLog(nextHp === 0 ? [action.text, monster.victory] : [action.text, line]);

    return h(
      "div",

  function FanfareParticles() {
    const canvasRef = useRef(null);

    useEffect(() => {
      const canvas = canvasRef.current;
      const context = canvas.getContext("2d");
      const particles = [];
      const palette = ["#ff6f61", "#ffd166", "#4ecdc4", "#7464d8", "#ffffff", "#f65f8d"];
      let frameId = 0;
      let last = performance.now();
      let width = 0;
      let height = 0;
      let burstClock = 0;

      const resize = () => {
        const rect = canvas.getBoundingClientRect();
        const dpr = Math.min(window.devicePixelRatio || 1, 2);
        width = rect.width;
        height = rect.height;
        canvas.width = Math.max(1, Math.floor(width * dpr));
        canvas.height = Math.max(1, Math.floor(height * dpr));
        context.setTransform(dpr, 0, 0, dpr, 0, 0);
      };

      const emitBurst = (originX, originY, count) => {
        for (let index = 0; index < count; index += 1) {
          const angle = -Math.PI / 2 + (Math.random() - 0.5) * Math.PI * 1.35;
          const speed = 2.5 + Math.random() * 5.4;
          particles.push({
            x: originX,
            y: originY,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed - Math.random() * 1.4,
            size: 4 + Math.random() * 8,
            spin: Math.random() * Math.PI,
            life: 80 + Math.random() * 60,
            age: 0,
            color: palette[index % palette.length],
            shape: Math.random() > 0.48 ? "rect" : "dot",
          });
        }
      };

      const drawTrumpetRays = (time) => {
        const pulse = 0.55 + Math.sin(time / 120) * 0.18;
        context.save();
        context.globalAlpha = pulse;
        context.fillStyle = "#ffd166";
        pixelRect(context, 22, height * 0.24, 80, 8);
        pixelRect(context, width - 102, height * 0.24, 80, 8);
        context.fillStyle = "#ff6f61";
        pixelRect(context, 40, height * 0.3, 64, 7);
        pixelRect(context, width - 104, height * 0.3, 64, 7);
        context.fillStyle = "#4ecdc4";
        pixelRect(context, 58, height * 0.18, 50, 7);
        pixelRect(context, width - 108, height * 0.18, 50, 7);
        context.restore();
      };

      const tick = (now) => {
        const delta = Math.min(2, (now - last) / 16.67);
        last = now;
        burstClock += delta;

        context.clearRect(0, 0, width, height);
        drawTrumpetRays(now);

        if (burstClock > 22) {
          burstClock = 0;
          emitBurst(width * 0.23, height * 0.32, 18);
          emitBurst(width * 0.77, height * 0.32, 18);
        }

        for (let index = particles.length - 1; index >= 0; index -= 1) {
          const particle = particles[index];
          particle.age += delta;
          particle.x += particle.vx * delta;
          particle.y += particle.vy * delta;
          particle.vy += 0.09 * delta;
          particle.spin += 0.12 * delta;

          const alpha = Math.max(0, 1 - particle.age / particle.life);
          if (alpha <= 0) {
            particles.splice(index, 1);
            continue;
          }

          context.save();
          context.globalAlpha = alpha;
          context.translate(particle.x, particle.y);
          context.rotate(particle.spin);
          context.fillStyle = particle.color;
          if (particle.shape === "dot") {
            context.beginPath();
            context.arc(0, 0, particle.size / 2, 0, Math.PI * 2);
            context.fill();
          } else {
            pixelRect(context, -particle.size / 2, -particle.size / 2, particle.size, particle.size * 0.58);
          }
          context.restore();
        }

        frameId = requestAnimationFrame(tick);
      };

      resize();
      emitBurst(width * 0.23, height * 0.32, 32);
      emitBurst(width * 0.77, height * 0.32, 32);
      const stopFanfare = playTinyFanfare();
      window.addEventListener("resize", resize);
      frameId = requestAnimationFrame(tick);

      return () => {
        cancelAnimationFrame(frameId);
        window.removeEventListener("resize", resize);
        stopFanfare?.();
      };
    }, []);

    return h("canvas", { ref: canvasRef, className: "fanfare-canvas", "aria-hidden": "true" });
  }

  function playTinyFanfare() {
    try {
      const AudioContext = window.AudioContext || window.webkitAudioContext;
      if (!AudioContext) return undefined;

      const audio = new AudioContext();
      const master = audio.createGain();
      const now = audio.currentTime;
      const notes = [523.25, 659.25, 783.99, 1046.5, 783.99, 1046.5];
      master.gain.setValueAtTime(0.0001, now);
      master.gain.exponentialRampToValueAtTime(0.075, now + 0.04);
      master.gain.exponentialRampToValueAtTime(0.0001, now + 1.28);
      master.connect(audio.destination);

      notes.forEach((frequency, index) => {
        const start = now + index * 0.12;
        const oscillator = audio.createOscillator();
        const gain = audio.createGain();
        oscillator.type = index % 2 === 0 ? "square" : "triangle";
        oscillator.frequency.setValueAtTime(frequency, start);
        gain.gain.setValueAtTime(0.0001, start);
        gain.gain.exponentialRampToValueAtTime(0.09, start + 0.025);
        gain.gain.exponentialRampToValueAtTime(0.0001, start + 0.18);
        oscillator.connect(gain);
        gain.connect(master);
        oscillator.start(start);
        oscillator.stop(start + 0.2);
      });

      audio.resume?.().catch(() => {});
      const closeTimer = window.setTimeout(() => {
        audio.close?.().catch(() => {});
      }, 1500);

      return () => {
        window.clearTimeout(closeTimer);
        audio.close?.().catch(() => {});
      };
    } catch (error) {
      return undefined;
    }
  }

  function updateWorld(delta, keys, virtual, player, env) {
    if (env.battle) return;

    let dx = 0;
    let dy = 0;

    if (keys.has("arrowleft") || keys.has("a")) dx -= 1;
    if (keys.has("arrowright") || keys.has("d")) dx += 1;
    if (keys.has("arrowup") || keys.has("w")) dy -= 1;
    if (keys.has("arrowdown") || keys.has("s")) dy += 1;

    dx += virtual.x;
    dy += virtual.y;

    if (dx !== 0 || dy !== 0) {
      const length = Math.hypot(dx, dy);
      dx /= length;
      dy /= length;

      const speed = 2.65;
      player.x = clamp(player.x + dx * speed * delta, 54, GAME_CONFIG.width - 54);
      player.y = clamp(player.y + dy * speed * delta, 116, GAME_CONFIG.height - 88);
      player.step += delta;

      if (Math.abs(dx) > Math.abs(dy)) {
        player.dir = dx > 0 ? "right" : "left";
      } else {
        player.dir = dy > 0 ? "down" : "up";
      }
    }

    const nextMonster = GAME_CONFIG.monsters[env.progress];

    if (nextMonster) {
      const isCrossingGate = player.x > nextMonster.x - 30 && Math.abs(player.y - nextMonster.y) < 74;
      const isTouchingMonster = distance(player.x, player.y, nextMonster.x, nextMonster.y) < 54;
      if (isCrossingGate || isTouchingMonster) {
        player.x = nextMonster.x - 66;
        player.y = nextMonster.y;
        env.openBattle(nextMonster);
      } else if (distance(player.x, player.y, nextMonster.x, nextMonster.y) < 118) {
        env.setStatus(`${nextMonster.name}의 기운이 가까워졌어요.`);
      } else if (env.progress === 0 && player.x < 160) {
        env.setStatus(GAME_CONFIG.startMessage);
      }
      return;
    }

    const letterDistance = distance(player.x, player.y, GAME_CONFIG.letter.x, GAME_CONFIG.letter.y);
    if (letterDistance < 50) {
      env.onComplete();
    } else if (letterDistance < 130) {
      env.setStatus("봉투가 따뜻하게 반짝이고 있어요.");
    } else {
      env.setStatus("모든 관문이 열렸어요. 숲 안쪽의 편지가 기다려요.");
    }
  }

  function drawWorld(context, player, progress, now) {
    const width = GAME_CONFIG.width;
    const height = GAME_CONFIG.height;
    context.clearRect(0, 0, width, height);

    drawSky(context, now);
    drawGrass(context);
    drawPath(context);
    drawDecorations(context, now);
    drawQuestMarkers(context, progress, now);
    drawPlayer(context, player, now);
    drawVignette(context);
  }

  function drawSky(context, now) {
    context.fillStyle = "#71c7ec";
    context.fillRect(0, 0, GAME_CONFIG.width, 118);
    context.fillStyle = "#f9e56b";
    pixelRect(context, 750, 26, 42, 42);
    pixelRect(context, 742, 36, 58, 22);
    context.fillStyle = "#ffffff";
    const drift = Math.sin(now / 1100) * 5;
    pixelRect(context, 84 + drift, 34, 72, 18);
    pixelRect(context, 110 + drift, 20, 44, 20);
    pixelRect(context, 548 - drift, 54, 86, 18);
    pixelRect(context, 578 - drift, 40, 36, 20);
  }

  function drawGrass(context) {
    context.fillStyle = "#58b86f";
    context.fillRect(0, 118, GAME_CONFIG.width, GAME_CONFIG.height - 118);

    for (let y = 132; y < GAME_CONFIG.height; y += 34) {
      for (let x = (y / 2) % 38; x < GAME_CONFIG.width; x += 52) {
        context.fillStyle = (x + y) % 3 === 0 ? "#2f8f5b" : "#77c86f";
        pixelRect(context, x, y, 6, 14);
        pixelRect(context, x + 8, y + 6, 6, 8);
      }
    }
  }

  function drawPath(context) {
    context.fillStyle = "#f2b66d";
    pixelRect(context, 0, 248, 190, 82);
    pixelRect(context, 160, 214, 180, 116);
    pixelRect(context, 320, 190, 210, 86);
    pixelRect(context, 500, 214, 150, 112);
    pixelRect(context, 630, 274, 180, 82);
    pixelRect(context, 790, 230, 170, 96);

    context.fillStyle = "#ffcf86";
    for (let x = 8; x < GAME_CONFIG.width; x += 42) {
      pixelRect(context, x, 286 + Math.sin(x / 80) * 34, 18, 10);
    }
  }

  function drawDecorations(context, now) {
    drawTree(context, 58, 156);
    drawTree(context, 842, 130);
    drawTree(context, 665, 132);
    drawTree(context, 388, 335);
    drawTree(context, 90, 382);
    drawTree(context, 594, 372);

    drawFlowers(context, 168, 392);
    drawFlowers(context, 438, 144);
    drawFlowers(context, 702, 410);
    drawFlowers(context, 818, 376);

    drawBalloons(context, 138, 146, now);
    drawBalloons(context, 890, 394, now + 400);
    drawSign(context, 58, 318, "START");
  }

  function drawQuestMarkers(context, progress, now) {
    GAME_CONFIG.monsters.forEach((monster, index) => {
      if (index < progress) {
        drawClearedMarker(context, monster.x, monster.y, now + index * 120);
      } else if (index === progress) {
        drawMonster(context, monster, true, now);
      } else {
        drawLockedCloud(context, monster.x, monster.y);
      }
    });

    if (progress >= GAME_CONFIG.monsters.length) {
      drawLetter(context, GAME_CONFIG.letter.x, GAME_CONFIG.letter.y, now);
    } else {
      drawLetterSilhouette(context, GAME_CONFIG.letter.x, GAME_CONFIG.letter.y);
    }

  function drawLetter(context, x, y, now) {
    const bob = Math.sin(now / 360) * 5;
    context.fillStyle = "rgba(255, 209, 102, 0.34)";
    pixelRect(context, x - 50, y - 52 + bob, 100, 92);
    context.fillStyle = "#fff5c7";
    pixelRect(context, x - 38, y - 24 + bob, 76, 52);

    context.lineWidth = 4;
    context.strokeRect(x - 38, y - 24 + bob, 76, 52);

    context.moveTo(x - 36, y - 22 + bob);

  function drawPlayer(context, player, now) {
    const bob = Math.sin(player.step / 5) * 3;
    const x = player.x;
    const y = player.y + bob;

    context.fillStyle = "rgba(0, 0, 0, 0.22)";
    pixelRect(context, x - 28, y + 38, 56, 12);

    context.fillStyle = "#ffd166";
    pixelRect(context, x - 18, y - 50, 8, 20);
    pixelRect(context, x - 4, y - 58, 8, 28);
    pixelRect(context, x + 10, y - 50, 8, 20);
    pixelRect(context, x - 22, y - 34, 44, 10);
    context.fillStyle = "#ffffff";
    pixelRect(context, x - 3, y - 52, 6, 6);

    context.fillStyle = "#7a4b2b";
    pixelRect(context, x - 24, y - 34, 48, 36);
    pixelRect(context, x - 28, y - 8, 14, 42);
    pixelRect(context, x + 14, y - 8, 14, 42);
    pixelRect(context, x - 18, y + 22, 36, 20);

    context.fillStyle = "#ffd0a6";
    pixelRect(context, x - 16, y - 24, 32, 32);
    context.fillStyle = "#7a4b2b";
    pixelRect(context, x - 20, y - 28, 40, 12);
    pixelRect(context, x - 20, y - 14, 8, 16);
    pixelRect(context, x + 12, y - 14, 8, 16);

    context.fillStyle = "#ffffff";
    pixelRect(context, x - 10, y - 10, 7, 7);
    pixelRect(context, x + 5, y - 10, 7, 7);
    context.fillStyle = "#21313f";
    pixelRect(context, x - 8, y - 8, 3, 3);
    pixelRect(context, x + 7, y - 8, 3, 3);
    pixelRect(context, x - 5, y + 2, 10, 4);
    context.fillStyle = "#ff8fab";
    pixelRect(context, x - 18, y + 10, 36, 18);
    context.fillStyle = "#f65f8d";
    pixelRect(context, x - 28, y + 24, 56, 26);
    context.fillStyle = "#ffb3c7";
    pixelRect(context, x - 18, y + 28, 36, 22);
    context.fillStyle = "#ffffff";
    pixelRect(context, x - 6, y + 15, 12, 11);
    context.fillStyle = "#ff6f61";
    pixelRect(context, x - 4, y + 18, 8, 8);

    if (player.dir === "left") {
      context.fillStyle = "#ffd0a6";
      pixelRect(context, x - 34, y + 10, 12, 8);
      context.fillStyle = "#ffd166";
      pixelRect(context, x - 46, y + 5, 16, 5);
      context.fillStyle = "#ff6f61";
      pixelRect(context, x - 52, y + 1, 8, 8);
    } else {
      context.fillStyle = "#ffd0a6";
      pixelRect(context, x + 22, y + 10, 12, 8);
      context.fillStyle = "#ffd166";
      pixelRect(context, x + 30, y + 5, 16, 5);
      context.fillStyle = "#ff6f61";
      pixelRect(context, x + 44, y + 1, 8, 8);
    }
  }

  function drawVignette(context) {
    context.strokeStyle = "rgba(33, 49, 63, 0.52)";
    context.lineWidth = 10;
    context.strokeRect(5, 5, GAME_CONFIG.width - 10, GAME_CONFIG.height - 10);
  }

  function pixelRect(context, x, y, width, height) {
    context.fillRect(Math.round(x), Math.round(y), Math.round(width), Math.round(height));
  }

  function distance(ax, ay, bx, by) {
    return Math.hypot(ax - bx, ay - by);
  }

  function clamp(value, min, max) {
    return Math.min(max, Math.max(min, value));
  }

  function isGameKey(key) {
    return ["arrowleft", "arrowright", "arrowup", "arrowdown", "w", "a", "s", "d"].includes(key);
  }

  const root = ReactDOM.createRoot(document.getElementById("root"));
  root.render(h(App));
})();

    </script>
